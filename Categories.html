<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories | SCC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
    <div id="app-shell" class="app-shell"><main class="app-main"><header id="topbar" class="topbar"></header>
        <section class="page-content stack">
            <div class="panel"><div class="panel-header"><h2>Add Category</h2></div><form id="category-form" class="page-content toolbar"><input class="form-input" name="name" placeholder="Category name" required><input class="form-input" name="subcategories" placeholder="Sub categories separated by comma"><button class="btn btn-primary" type="submit">Save Category</button></form></div>
            <div class="panel"><div class="panel-header"><h2>Category List</h2></div><table class="data-table"><thead><tr><th>Category</th><th>Sub Categories</th><th>Updated</th><th>Action</th></tr></thead><tbody id="categories-body"></tbody></table></div>
        </section>
    </main></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script><script src="js/firebase.js"></script><script src="js/roles.js"></script><script src="js/utils.js"></script><script src="js/authGuard.js"></script><script src="js/layout.js"></script><script src="js/categories.js"></script>
</body>
</html>
