<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SCC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <main class="login-card">
        <img src="logo.png" alt="SCC Logo">
        <h1>SCC Admin Portal</h1>
        <p>Sign in with your Firebase account.</p>
        <div id="login-error" class="error-box"></div>
        <form id="login-form" class="stack">
            <input class="form-input" type="email" name="email" placeholder="Email" required>
            <input class="form-input" type="password" name="password" placeholder="Password" required>
            <button id="login-submit" class="btn btn-primary" type="submit">Sign In</button>
        </form>
    </main>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/roles.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/authGuard.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
