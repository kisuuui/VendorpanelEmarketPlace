<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | SCC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"><script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script><link rel="stylesheet" href="styles.css">
</head>
<body class="admin-page">
    <div id="app-shell" class="app-shell"><main class="app-main"><header id="topbar" class="topbar"></header>
        <section class="page-content two-col">
            <div class="panel"><div class="panel-header"><h2>Profile Details</h2></div>
                <form id="profile-form" class="page-content stack">
                    <input id="profile-first" class="form-input" placeholder="First name">
                    <input id="profile-last" class="form-input" placeholder="Last name">
                    <input id="profile-email" class="form-input" placeholder="Email" disabled>
                    <input id="profile-phone" class="form-input" placeholder="Phone">
                    <input id="profile-student" class="form-input" placeholder="Student number">
                    <input id="profile-photo" class="form-input" type="file" accept="image/*">
                    <button class="btn btn-primary" type="submit">Save Profile</button>
                </form>
            </div>
            <div class="panel"><div class="panel-header"><h2>Account</h2></div>
                <div class="page-content stack">
                    <p><strong>UID:</strong> <span id="profile-uid">--</span></p>
                    <p><strong>Firebase UID:</strong> <span id="profile-firebase-uid">--</span></p>
                    <p><strong>Role:</strong> <span id="profile-role">--</span></p>
                    <p><strong>Status:</strong> <span id="profile-status">--</span></p>
                </div>
            </div>
        </section>
    </main></div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script><script src="js/firebase.js"></script><script src="js/roles.js"></script><script src="js/utils.js"></script><script src="js/authGuard.js"></script><script src="js/layout.js"></script><script src="js/profile.js"></script>
</body>
</html>
